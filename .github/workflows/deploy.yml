name: Deploy to Cloudflare

on:
  push:
    branches: [master]
    paths:
      - 'web_rewrite/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web_rewrite/package-lock.json
      - run: npm ci
        working-directory: web_rewrite
      - run: npm run build
        working-directory: web_rewrite
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web_rewrite
          command: deploy
