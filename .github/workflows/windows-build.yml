name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild "Robots Massacre Client.sln" /p:Configuration=Release /p:Platform="Any CPU" /m /v:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: robots-massacre-client-release
          path: |
            bin/Release/**
