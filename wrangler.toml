name = "robots-massacre-web-rewrite"
main = "web_rewrite/worker/signaling.ts"
compatibility_date = "2026-07-04"

[build]
command = "npm install && npm run build"
cwd = "web_rewrite"
watch_dir = "web_rewrite"

[assets]
directory = "./web_rewrite/dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LobbyObject"]
