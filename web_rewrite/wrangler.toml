name = "robots-massacre-web-rewrite"
main = "worker/signaling.ts"
compatibility_date = "2026-07-04"

[assets]
directory = "./dist"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyObject"

[[durable_objects.bindings]]
name = "KILLS"
class_name = "KillsObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["LobbyObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["KillsObject"]
